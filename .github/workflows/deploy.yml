name: Deploy Dutch Course to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to UGent VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /var/www/dutch
            git pull origin main
            /var/www/dutch/.venv/bin/pip install -r requirements.txt -q
            sudo systemctl restart dutch-course
            echo "Deployed at $(date)"
